services:
  app:
    build: .
    ports:
      - "8100:8000"
      - "9000:8000"
    env_file:
      - .env
    environment:
      LOCAL_DEV: "true"
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      MQTT_BROKER_URL: mqtt://mosquitto:1883
      SEED_DEVICE_COUNT: "10"
    volumes:
      - ./data:/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - platform-net
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - platform-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - platform-net

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
      - "8883:8883"
    volumes:
      - ./infra/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    networks:
      - platform-net

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    networks:
      - platform-net

  frontend:
    build: ./frontend
    ports:
      - "3200:80"
    depends_on:
      - app
    networks:
      - platform-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3100:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - platform-net

  delta_compactor:
    build: .
    command:
      - /bin/sh
      - -c
      - |
        while true; do
          echo "[delta_compactor] Running Delta compaction at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          python scripts/compact_delta.py --base-dir /data/delta --recommendations-dir /data/recommendations
          sleep 900
        done
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD-SHELL", "test -d /data/delta || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      - app
    networks:
      - platform-net
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  mosquitto_data:
  mosquitto_log:
  prometheus_data:
  grafana_data:

networks:
  platform-net:
    driver: bridge
