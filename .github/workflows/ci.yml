name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Pre-commit (lint + format) ───────────────────────────────────────────────
  pre-commit:
    name: Pre-commit checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: npm ci --prefix frontend

      - uses: pre-commit/action@v3.0.1

  # ── Backend unit tests ───────────────────────────────────────────────────────
  test-backend:
    name: Backend unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: python -m pytest tests/unit/ -v --tb=short

  # ── Frontend unit tests ──────────────────────────────────────────────────────
  test-frontend:
    name: Frontend unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix frontend

      - name: Run tests
        run: npm --prefix frontend run test

  # ── Deploy to EC2 ────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: [pre-commit, test-backend, test-frontend]
    if: github.event_name == 'push'
    concurrency:
      group: deploy-production
      cancel-in-progress: false

    steps:
      - name: Bootstrap and deploy
        uses: appleboy/ssh-action@v1.2.0
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          REPO: ${{ github.repository }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: GH_TOKEN,REPO
          command_timeout: 15m
          script_stop: true
          script: |
            set -euo pipefail

            # ── 1. Install Docker (idempotent) ──────────────────────────────
            if ! command -v docker &>/dev/null; then
              echo "[bootstrap] Installing Docker..."
              curl -fsSL https://get.docker.com | sudo sh
              sudo usermod -aG docker "$USER"
            fi

            sudo systemctl enable docker --now

            # ── 2. Install git (idempotent) ─────────────────────────────────
            if ! command -v git &>/dev/null; then
              echo "[bootstrap] Installing git..."
              if command -v apt-get &>/dev/null; then
                sudo apt-get update -qq && sudo apt-get install -y git
              else
                sudo yum install -y git
              fi
            fi

            # ── 3. Clone or update repository ───────────────────────────────
            APP_DIR="$HOME/platform"
            REMOTE="https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git"

            if [ -d "$APP_DIR/.git" ]; then
              echo "[deploy] Pulling latest code..."
              git -C "$APP_DIR" remote set-url origin "$REMOTE"
              git -C "$APP_DIR" fetch --prune
              git -C "$APP_DIR" reset --hard origin/main
            else
              echo "[deploy] Cloning repository..."
              git clone "$REMOTE" "$APP_DIR"
            fi

            # ── 4. Build and restart services ───────────────────────────────
            cd "$APP_DIR"
            echo "[deploy] Building and starting containers..."
            docker compose up --build -d --remove-orphans

            # ── 5. Wait for app to be healthy ────────────────────────────────
            echo "[deploy] Waiting for app to be healthy..."
            for i in $(seq 1 30); do
              if docker compose exec -T app curl -sf http://localhost:8000/health &>/dev/null; then
                echo "[deploy] App is healthy."
                break
              fi
              if [ "$i" -eq 30 ]; then
                echo "[deploy] Timed out waiting for app health check."
                docker compose logs app --tail 50
                exit 1
              fi
              sleep 5
            done

            # ── 6. Run database migrations ───────────────────────────────────
            echo "[deploy] Running migrations..."
            docker compose exec -T app alembic upgrade head

            # ── 7. Remove dangling images ────────────────────────────────────
            docker image prune -f

            echo "[deploy] Done."
