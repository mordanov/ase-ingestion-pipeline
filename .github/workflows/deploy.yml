name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

# Prevent concurrent deploys; never cancel a deploy in flight
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Bootstrap and deploy
        uses: appleboy/ssh-action@v1.2.0
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          REPO: ${{ github.repository }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: GH_TOKEN,REPO
          command_timeout: 15m
          script_stop: true   # abort on first error
          script: |
            set -euo pipefail

            # ── 1. Install Docker (idempotent) ─────────────────────────────
            if ! command -v docker &>/dev/null; then
              echo "[bootstrap] Installing Docker..."
              curl -fsSL https://get.docker.com | sudo sh
              sudo usermod -aG docker "$USER"
            fi

            sudo systemctl enable docker --now

            # ── 2. Install git (idempotent) ────────────────────────────────
            if ! command -v git &>/dev/null; then
              echo "[bootstrap] Installing git..."
              if command -v apt-get &>/dev/null; then
                sudo apt-get update -qq && sudo apt-get install -y git
              else
                sudo yum install -y git
              fi
            fi

            # ── 3. Clone or update repository ──────────────────────────────
            APP_DIR=/opt/platform
            REMOTE="https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git"

            if [ -d "$APP_DIR/.git" ]; then
              echo "[deploy] Pulling latest code..."
              sudo git -C "$APP_DIR" remote set-url origin "$REMOTE"
              sudo git -C "$APP_DIR" fetch --prune
              sudo git -C "$APP_DIR" reset --hard origin/main
            else
              echo "[deploy] Cloning repository..."
              sudo git clone "$REMOTE" "$APP_DIR"
            fi

            # ── 4. Build and restart services ──────────────────────────────
            cd "$APP_DIR"
            echo "[deploy] Building and starting containers..."
            sudo docker compose up --build -d --remove-orphans

            # ── 5. Wait for app to be healthy ──────────────────────────────
            echo "[deploy] Waiting for app to be healthy..."
            for i in $(seq 1 30); do
              if sudo docker compose exec -T app curl -sf http://localhost:8000/health &>/dev/null; then
                echo "[deploy] App is healthy."
                break
              fi
              if [ "$i" -eq 30 ]; then
                echo "[deploy] Timed out waiting for app health check."
                sudo docker compose logs app --tail 50
                exit 1
              fi
              sleep 5
            done

            # ── 6. Run database migrations ─────────────────────────────────
            echo "[deploy] Running migrations..."
            sudo docker compose exec -T app alembic upgrade head

            # ── 7. Remove dangling images ──────────────────────────────────
            sudo docker image prune -f

            echo "[deploy] Done."
