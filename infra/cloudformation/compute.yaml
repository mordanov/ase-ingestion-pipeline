AWSTemplateFormatVersion: "2010-09-09"
Description: "Health Platform — ECS Fargate, ALB, RDS, ElastiCache"

Parameters:
  Environment:
    Type: String
    Default: poc
  VpcId:
    Type: String
  PublicSubnet1:
    Type: String
  PublicSubnet2:
    Type: String
  PrivateSubnet1:
    Type: String
  PrivateSubnet2:
    Type: String
  AlbSGId:
    Type: String
  EcsSGId:
    Type: String
  RdsSGId:
    Type: String
  RedisSGId:
    Type: String
  EcsExecutionRoleArn:
    Type: String
  EcsTaskRoleArn:
    Type: String
  KinesisStreamName:
    Type: String
  AppImage:
    Type: String
    Default: "health-platform:latest"
  DBPassword:
    Type: String
    NoEcho: true
    Default: "changeme-in-prod"

Resources:
  EcrRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub "${Environment}-health-platform"

  EcsCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub "${Environment}-health-cluster"

  DbSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: "Platform RDS subnet group"
      SubnetIds: [!Ref PrivateSubnet1, !Ref PrivateSubnet2]

  Database:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: !Sub "${Environment}-health-db"
      DBInstanceClass: db.t3.micro
      Engine: postgres
      EngineVersion: "15"
      MasterUsername: platform
      MasterUserPassword: !Ref DBPassword
      DBName: platform
      AllocatedStorage: 20
      StorageEncrypted: true
      MultiAZ: false
      PubliclyAccessible: false
      VPCSecurityGroups: [!Ref RdsSGId]
      DBSubnetGroupName: !Ref DbSubnetGroup
      DeletionProtection: false

  CacheSubnetGroup:
    Type: AWS::ElastiCache::SubnetGroup
    Properties:
      Description: "Platform Redis subnet group"
      SubnetIds: [!Ref PrivateSubnet1, !Ref PrivateSubnet2]

  RedisCluster:
    Type: AWS::ElastiCache::ReplicationGroup
    Properties:
      ReplicationGroupDescription: "Platform Redis"
      NumCacheClusters: 1
      CacheNodeType: cache.t3.micro
      Engine: redis
      EngineVersion: "7.0"
      CacheSubnetGroupName: !Ref CacheSubnetGroup
      SecurityGroupIds: [!Ref RedisSGId]
      AtRestEncryptionEnabled: true
      TransitEncryptionEnabled: true

  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${Environment}-health-platform"
      Cpu: "512"
      Memory: "1024"
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      ExecutionRoleArn: !Ref EcsExecutionRoleArn
      TaskRoleArn: !Ref EcsTaskRoleArn
      ContainerDefinitions:
        - Name: app
          Image: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${EcrRepository}:latest"
          PortMappings:
            - ContainerPort: 8000
          Environment:
            - Name: LOCAL_DEV
              Value: "false"
            - Name: KINESIS_STREAM_NAME
              Value: !Ref KinesisStreamName
            - Name: AWS_REGION
              Value: !Ref AWS::Region
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Sub "/ecs/${Environment}-health-platform"
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs

  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/${Environment}-health-platform"
      RetentionInDays: 7

  Alb:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub "${Environment}-health-alb"
      Subnets: [!Ref PublicSubnet1, !Ref PublicSubnet2]
      SecurityGroups: [!Ref AlbSGId]
      Scheme: internet-facing

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub "${Environment}-health-tg"
      Port: 8000
      Protocol: HTTP
      VpcId: !Ref VpcId
      TargetType: ip
      HealthCheckPath: /health
      HealthCheckIntervalSeconds: 30

  AlbListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref Alb
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  EcsService:
    Type: AWS::ECS::Service
    DependsOn: AlbListener
    Properties:
      ServiceName: !Sub "${Environment}-health-service"
      Cluster: !Ref EcsCluster
      TaskDefinition: !Ref TaskDefinition
      DesiredCount: 1
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets: [!Ref PrivateSubnet1, !Ref PrivateSubnet2]
          SecurityGroups: [!Ref EcsSGId]
          AssignPublicIp: DISABLED
      LoadBalancers:
        - ContainerName: app
          ContainerPort: 8000
          TargetGroupArn: !Ref TargetGroup

Outputs:
  AlbDnsName:
    Value: !GetAtt Alb.DNSName
    Export: { Name: !Sub "${Environment}-AlbDnsName" }
  EcrRepositoryUri:
    Value: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${EcrRepository}"
    Export: { Name: !Sub "${Environment}-EcrUri" }
  DatabaseEndpoint:
    Value: !GetAtt Database.Endpoint.Address
    Export: { Name: !Sub "${Environment}-DbEndpoint" }
  RedisEndpoint:
    Value: !GetAtt RedisCluster.PrimaryEndPoint.Address
    Export: { Name: !Sub "${Environment}-RedisEndpoint" }
